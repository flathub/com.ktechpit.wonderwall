base: io.qt.qtwebengine.BaseApp
base-version: '6.10'
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: wonderwall
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --env=INSTALL_TYPE=flatpak

cleanup:
  - /include
  - /lib/cmake
  - /share/man
  - /share/doc
  
modules:
  - shared-modules/squashfs-tools/squashfs-tools.json

  - name: wonderwall
    buildsystem: simple
    build-commands:
        - unsquashfs -no-progress *.snap
        - install -Dm755 squashfs-root/usr/bin/wonderwall ${FLATPAK_DEST}/bin/wonderwall
        - cp -r squashfs-root/usr/share/icons ${FLATPAK_DEST}/share/
        - install -Dm644 squashfs-root/usr/share/applications/com.ktechpit.wonderwall.desktop ${FLATPAK_DEST}/share/applications/com.ktechpit.wonderwall.desktop
        - desktop-file-edit --set-icon=${FLATPAK_ID} ${FLATPAK_DEST}/share/applications/com.ktechpit.wonderwall.desktop
        - install -Dm644 squashfs-root/usr/share/metainfo/com.ktechpit.wonderwall.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.ktechpit.wonderwall.metainfo.xml
    sources:
        # =========================
        # x86_64 (amd64) – stable
        # =========================
        - type: file
          # Get stable amd64 snap URL:
          # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/wonderwall | jq -r '.["channel-map"][] | select(.channel.architecture=="amd64" and   .channel.risk=="stable" and .channel.track=="latest") | .download.url'
          url: https://api.snapcraft.io/api/v1/snaps/download/dTUYjQSnIgQUyVp54XoO5SwD1xkn4hzA_43.snap

          # Get sha256:
          # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/dTUYjQSnIgQUyVp54XoO5SwD1xkn4hzA_43.snap | sha256sum
          sha256: 65f6059824a3016b81ff97f26c1f72dd5dd32f4123821afd783917ce6cd9d0f7

          only-arches:
            - x86_64

        # =========================
        # arm64 (aarch64) – stable
        # =========================
        - type: file
          # Get stable arm64 snap URL:
          # curl -H 'Snap-Device-Series: 16' https://api.snapcraft.io/v2/snaps/info/wonderwall | jq -r '.["channel-map"][] | select(.channel.architecture=="arm64" and  .channel.risk=="stable" and .channel.track=="latest") | .download.url'
          url: https://api.snapcraft.io/api/v1/snaps/download/dTUYjQSnIgQUyVp54XoO5SwD1xkn4hzA_44.snap

          # Get sha256:
          # curl -Ls https://api.snapcraft.io/api/v1/snaps/download/dTUYjQSnIgQUyVp54XoO5SwD1xkn4hzA_44.snap | sha256sum
          sha256: 84e7db6721e4feb7aca527f7d755b13d8e3ccd0ff48e79d50f2404f215c678de

          only-arches:
            - aarch64
