app-id: com.ktechpit.wonderwall
base: io.qt.qtwebkit.BaseApp
base-version: '5.14'
runtime: org.kde.Platform
runtime-version: '5.14'
sdk: org.kde.Sdk
command: wonderwall
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --filesystem=xdg-download
  - --device=dri

  - --talk-name=org.freedesktop.FileManager1
  
  - --talk-name=org.elementary.Contractor
  - --system-talk-name=org.freedesktop.Accounts
  
modules:
  - name: ww
    buildsystem: simple
    build-commands:
     - cp -va ww/* ${FLATPAK_DEST}
    sources:
    - type: archive
      url: https://github.com/keshavbhatt/WonderWall-Packaging/releases/download/v7.0/wonderwall_7.0.389_flathub.zip
      dest: ww
      strip-components: 0
      only-arches:
        - x86_64
      sha256: 5aa7bd33d2305e5d85f92878d88e14bdd35793318ba766f32278b44d0384d3ac
    - type: patch
      path: patches/wonderwall-appstream.patch
      options:
        - -d
        - ww
